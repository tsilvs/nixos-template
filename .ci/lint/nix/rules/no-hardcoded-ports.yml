id: no-hardcoded-ports
language: nix
severity: error
note: >
  Catch literal integer port numbers in Nix modules.
  Ports belong in conf/profiles/<host>/variables.nix.
  Modules must reference vars.* or cfg.*, never hardcode.
files:
  - "nix/**/*.nix"
  - "flake.nix"
ignores:
  - "**/conf/variables.nix"
rule:
  all:
    - kind: binding
    - has:
        kind: attrpath
        has:
          kind: identifier
          regex: "^(port|sshPort|listenPort|bindPort|hostPort|containerPort|metricsPort)$"
    - has:
        kind: integer_expression
    - not:
        has:
          kind: select_expression
          has:
            kind: variable_expression
            regex: "^(vars|cfg)$"
message: "hardcoded port. Move to variables.nix, reference via vars.*"
