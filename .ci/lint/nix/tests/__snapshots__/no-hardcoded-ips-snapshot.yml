id: no-hardcoded-ips
snapshots:
  ? |-
    {
      networking.defaultGateway = "10.0.0.1";
    }
  : labels:
    - source: networking.defaultGateway = "10.0.0.1";
      style: primary
      start: 4
      end: 43
    - source: '"10.0.0.1"'
      style: secondary
      start: 32
      end: 42
  ? |
    {
      networking.ip = "192.168.1.100";
    }
  : labels:
    - source: networking.ip = "192.168.1.100";
      style: primary
      start: 4
      end: 36
    - source: '"192.168.1.100"'
      style: secondary
      start: 20
      end: 35
