name: "CI - Flake check"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    # ubuntu-latest = ubuntu-24.04 on GitHub-hosted runners.
    # For local act: act -P ubuntu-latest=ubuntu:24.04
    runs-on: ubuntu-latest

    steps:
      # actions/checkout applies safe.directory patch (CVE-2022-24765),
      # sets GITHUB_WORKSPACE, injects GITHUB_TOKEN into credential store.
      - uses: actions/checkout@v7
        with:
          submodules: false # submodules fetched in next step via PAT

      - uses: ./.github/actions/submodules
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: ./.github/actions/nix-install

      # Auto-format on push to main (not PR).
      # Runs alejandra in-place, commits + pushes if changes.
      # continue-on-error: push may fail in local act (no GitHub creds).
      - name: "Auto-format (main push only)"
        if: github.event_name == 'push'
        continue-on-error: true
        shell: bash
        run: |
          nix run nixpkgs#alejandra -- nix/
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add nix/
            git commit -m "style: auto-format with alejandra [skip ci]"
            git push || true
          fi

      - uses: ./.github/actions/lint

      - uses: ./.github/actions/flake-check
