# .gitlab-ci.yml - GitLab CI equivalent of .github/workflows/ci.yml
# Installs Nix manually; no cachix dependency.
# Always builds the example profile (example-host).

stages:
  - lint
  - check

variables:
  NIX_CONFIG: "experimental-features = nix-command flakes"
  GIT_SUBMODULE_STRATEGY: recursive # fetches submodules; set GIT_SUBMODULE_DEPTH if needed

# Shared Nix install snippet - referenced by both jobs.
# Mirrors .github/actions/nix-install/action.yml logic.
.install-nix: &install-nix
  - apt-get update -qq && apt-get install -y -qq curl xz-utils git
  - |
    set -euo pipefail
    INSTALL_URL="https://nixos.org/nix/install"
    CURL_OPTS="--proto =https --tlsv1.2 -sSf -L"
    # systemd package installed ≠ systemd running as PID 1.
    # Docker runs CMD as PID 1, skips init boot → systemctl fails.
    # Detect: pidof finds running systemd; /run/systemd/system
    # exists on full-boot OSes, absent in containers.
    # --nix-extra-conf-file takes a file path, not inline text.
    EXTRA_CONF_FILE="$(mktemp)"
    echo "experimental-features = nix-command flakes" > "$EXTRA_CONF_FILE"
    if pidof systemd >/dev/null 2>&1 || [ -d /run/systemd/system ]; then
      # multi-user daemon — systemd available, daemon manages /nix/store.
      curl $CURL_OPTS "$INSTALL_URL" \
        | sh -s -- --daemon --yes --nix-extra-conf-file "$EXTRA_CONF_FILE"
    else
      # single-user no-daemon — container without running systemd.
      # Runs as root inside container → owns /nix → no lock permission issues.
      curl $CURL_OPTS "$INSTALL_URL" \
        | sh -s -- --no-daemon --yes --nix-extra-conf-file "$EXTRA_CONF_FILE"
    fi
    rm -f "$EXTRA_CONF_FILE"
    # Profile not built on fresh install → no profile.d/ scripts.
    # Find nix binary in store directly; fall back to profile paths.
    NIX_BIN_DIR=$(ls -d /nix/store/*nix-*/bin 2>/dev/null | head -1)
    [ -n "$NIX_BIN_DIR" ] && export PATH="$NIX_BIN_DIR:$PATH"
    export PATH="$HOME/.nix-profile/bin:/nix/var/nix/profiles/default/bin:$PATH"
    # NIX_CONFIG env var above provides runtime config fallback.

lint:
  stage: lint
  image: ubuntu:24.04
  script:
    - *install-nix
    - nix run nixpkgs#alejandra -- --check nix/
    - nix run nixpkgs#deadnix -- --fail nix/
    - nix run nixpkgs#statix -- check .
    - nix run nixpkgs#ast-grep -- scan --rule .ci/lint/nix/rules/ nix/

flake-check:
  stage: check
  image: ubuntu:24.04
  script:
    - *install-nix
    - >
      nix flake check --no-build
      --override-input nix-modules ./nix/modules
    - >
      nix build
      '.#nixosConfigurations.example-host.config.system.build.toplevel'
      --no-link
      --override-input nix-modules ./nix/modules
    - nix store optimise
