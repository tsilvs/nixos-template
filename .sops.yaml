# conf/secrets/.sops.yaml
# ─────────────────────────────────────────────────────────────────────────────
# SOPS creation rules - maps secret files to encryption keys.
#
# Setup:
#   1. Generate admin age key (once, on your machine):
#        age-keygen -o ~/.config/sops/age/keys.txt
#        # prints: Public key: age1...
#
#   2. Replace AGE_ADMIN_PUBKEY below with your public key.
#
#   3. For each host, add its SSH host key as an age recipient:
#        # After first boot:
#        ssh-keyscan <host-ip> | ssh-to-age
#        # prints: age1...
#      Add as AGE_HOST_<HOSTNAME>_PUBKEY below.
#
#   4. Create / edit secrets:
#        sops conf/secrets/<hostname>/secrets.yaml
#
#   5. On the NixOS host, sops-nix uses /etc/ssh/ssh_host_ed25519_key as the
#      age identity (set via sops.age.sshKeyPaths in default.nix).
# ─────────────────────────────────────────────────────────────────────────────

creation_rules:
  - path_regex: conf/secrets/example-host/.*\.yaml$
    key_groups:
      - age:
          - &admin age1gp8mh9n6txldh6pgppq5pkqds7maea2p92agcy6j4e45t5p9l3xsrl0w2t # admin machine
          - &host_example_host age1gp8mh9n6txldh6pgppq5pkqds7maea2p92agcy6j4e45t5p9l3xsrl0w2t # TODO: replace after first boot with: ssh-keyscan <host-ip> | ssh-to-age


  # Template for additional hosts:
  # - path_regex: conf/secrets/<hostname>/.*\.yaml$
  #   key_groups:
  #     - age:
  #         - *admin
  #         - age1<host-ssh-to-age-pubkey>
