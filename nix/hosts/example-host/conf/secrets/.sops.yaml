# conf/example-host/secrets/.sops.yaml
# ─────────────────────────────────────────────────────────────────────────────
# SOPS creation rules for this host profile.
# Place a copy of this file at conf/<hostname>/secrets/.sops.yaml for each host.
#
# Setup:
#   1. Generate admin age key (once, on your machine):
#        age-keygen -o ~/.config/sops/age/keys.txt
#        # prints: Public key: age1...
#
#   2. Replace the admin pubkey below with yours.
#
#   3. After first boot, add the host SSH host key as age recipient:
#        ssh-keyscan <host-ip> | ssh-to-age
#        # prints: age1...
#      Replace &host_example_host value below.
#
#   4. Create / edit secrets:
#        sops conf/<hostname>/secrets/secrets.yaml
#
#   5. On the NixOS host, sops-nix uses /etc/ssh/ssh_host_ed25519_key as the
#      age identity (set via sops.age.sshKeyPaths in default.nix).
# ─────────────────────────────────────────────────────────────────────────────

creation_rules:
  - path_regex: conf/example-host/secrets/.*\.yaml$
    key_groups:
      - age:
          - &admin age1gp8mh9n6txldh6pgppq5pkqds7maea2p92agcy6j4e45t5p9l3xsrl0w2t # admin machine
          - &host_example_host age1gp8mh9n6txldh6pgppq5pkqds7maea2p92agcy6j4e45t5p9l3xsrl0w2t # TODO: replace after first boot with: ssh-keyscan <host-ip> | ssh-to-age


  # Template for additional hosts (copy this file to conf/<hostname>/secrets/.sops.yaml):
  # - path_regex: conf/<hostname>/secrets/.*\.yaml$
  #   key_groups:
  #     - age:
  #         - *admin
  #         - age1<host-ssh-to-age-pubkey>
